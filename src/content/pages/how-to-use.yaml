    content: >-
      Scaffold is a website starter built with [Astro](https://astro.build). It
      gives you a ready-to-use site with a page builder, a content management
      system, and a set of reusable components.


      This guide walks you through installation, day-to-day editing, and the
      main concepts you need to know.
